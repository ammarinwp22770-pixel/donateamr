<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Permissions-Policy" content="autoplay=*">
<title>💖 Alert System</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
  font-family: "Prompt", sans-serif;
  color: white;
}

.alert {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.6);

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  padding: 28px 42px;

  /* 🎨 glass premium */
  background: rgba(10, 15, 35, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border-radius: 24px;

  border: 1px solid rgba(105, 234, 255, 0.25);

  /* ✨ neon glow layered */
  box-shadow:
    0 0 20px rgba(105,234,255,0.2),
    0 0 60px rgba(0,150,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.05);

  text-align: center;

  animation: popWOW 0.55s cubic-bezier(.2,1.2,.3,1) forwards;

  z-index: 9999;
}

@keyframes popWOW {
  0% {
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    filter: blur(8px);
  }
  60% {
    transform: translate(-50%, -50%) scale(1.12);
    opacity: 1;
    filter: blur(0px);
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
  }
}

/* ✨ fade out */
@keyframes fade {
  to {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.9);
  }
}

/* 💖 hover glow (ถ้าต้องการ future use) */
.alert:hover {
  box-shadow:
    0 0 30px rgba(105,234,255,0.35),
    0 0 90px rgba(0,150,255,0.2);
}

@keyframes fade {
  to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}

/* 💖 TEXT */
.alert .name {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 10px rgba(105,234,255,0.5);
}

.alert .amount {
  font-size: 22px;
  color: #69eaff;
  font-weight: 700;
}

.alert .comment {
  font-size: 16px;
  opacity: 0.85;
}

/* 🎉 WOW GIF */
.alert img {
  width: 140px;
  height: auto;
  margin-top: 6px;
  filter: drop-shadow(0 0 10px rgba(105,234,255,0.5));
}

.particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #69eaff;
}
</style>
</head>

<body>

<script>
let unlocked = false;

// =========================
// 🔊 UNLOCK AUDIO
// =========================
function unlock() {
  if (unlocked) return;
  unlocked = true;

  const u = new SpeechSynthesisUtterance(" ");
  speechSynthesis.speak(u);

  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

window.addEventListener("click", unlock);
window.addEventListener("touchstart", unlock);

// =========================
// 🌐 WS CONNECT
// =========================
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") +
  location.host +
  "/ws"
);

let queue = [];
let playing = false;

ws.onopen = () => console.log("🟢 WS Connected");

// =========================
// 📩 RECEIVE DATA
// =========================
ws.onmessage = (e) => {
  try {
    const data = JSON.parse(e.data);

    if (!data) return;

    if (data.type === "config_update") {
      window.config = data.config;
      return;
    }

    if (data.name && data.amount !== undefined) {
      queue.push(data);
      if (!playing) play();
    }

  } catch (err) {}
};

// =========================
// ▶️ QUEUE SYSTEM
// =========================
async function play() {
  if (!queue.length) {
    playing = false;
    return;
  }

  playing = true;

  const data = queue.shift();
  await showAlert(data);

  setTimeout(play, 600);
}

// =========================
// 🔊 SOUND FIRST + TTS AFTER
// =========================
function playTTS(text) {
  const url = "/tts?text=" + encodeURIComponent(text);

  const audio = new Audio(url);
  audio.volume = 1;
  audio.play().catch(err => console.log("TTS ERROR", err));
}

// =========================
// 🎬 SHOW ALERT
// =========================
async function showAlert(data) {
  return new Promise((resolve) => {

    const cfg = window.config || {};

    const textToSpeak =
      `ขอบคุณ ${data.name} ${data.amount} บาท` +
      (data.comment ? ` ${data.comment}` : "");

    const box = document.createElement("div");
    box.className = "alert";
    box.style.borderColor = cfg.color || "#69eaff";

box.innerHTML = `
 <img src="/uploads/WOW.gif">

  <div class="name">💖 ขอบคุณ ${data.name}</div>
  <div class="amount">${data.amount} บาท</div>
  <div class="comment">${data.comment || ""}</div>
`;

    document.body.appendChild(box);

    const sound = new Audio(cfg.sound || "/alert.mp3");
    sound.volume = 1;

    let done = false;

    const finish = () => {
      if (done) return;
      done = true;

      speechSynthesis.cancel();

      // 🔥 สำคัญ: delay นิดเดียวให้เสียงไม่ตีกัน
      setTimeout(() => {
        playTTS(textToSpeak);
      }, 150);

      resolve();
    };

    sound.play()
      .then(() => {
        sound.onended = finish;
      })
      .catch(() => finish());

    setTimeout(finish, 5000);

    // particles
    for (let i = 0; i < 15; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      document.body.appendChild(p);

      const x = (Math.random() - 0.5) * 400;
      const y = (Math.random() - 0.5) * 300;

      p.animate([
        { transform: "translate(0,0)", opacity: 1 },
        { transform: `translate(${x}px,${y}px)`, opacity: 0 }
      ], { duration: 1200 });

      setTimeout(() => p.remove(), 1200);
    }

    setTimeout(() => {
      box.style.animation = "fade 0.8s forwards";
      setTimeout(() => box.remove(), 800);
    }, 3500);
  });
}
</script>

</body>
</html>
