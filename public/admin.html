<!DOCTYPE html>
<meta charset="UTF-8">
<title>ADMIN CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">

<style>
body{
  font-family: Prompt;
  background:#0b1020;
  color:white;
  padding:20px;
}
.card{
  background:#ffffff10;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
textarea{
  width:100%;
  margin-top:5px;
}
button{
  margin-top:5px;
  background:#69eaff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}
</style>
</head>

<body>
<h2>📩 Admin Inbox</h2>
<div id="box"></div>

<script>
const box = document.getElementById("box");
let isTyping = false;

// เก็บ DOM ของแต่ละข้อความ
const msgElements = {};

async function load(){
  const res = await fetch("/messages");
  const data = await res.json();

  data.reverse().forEach(m => {
    // ถ้า element สำหรับข้อความนี้ยังไม่มี → สร้างใหม่
    if(!msgElements[m.id]){
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${m.name}</b><br>
        ${m.msg}<br>
        <div id="reply${m.id}" style="color:#69eaff">
          ${m.reply ? "↩️ " + m.reply : ""}
        </div>
        <textarea id="r${m.id}" placeholder="ตอบกลับ..."
          onfocus="isTyping=true" onblur="isTyping=false"></textarea>
        <button onclick="reply(${m.id})">ตอบ</button>
      `;

      box.appendChild(div);
      msgElements[m.id] = div;
    } else {
      // ถ้า element มีอยู่แล้ว → update reply เท่านั้น
      const replyDiv = document.getElementById("reply"+m.id);
      replyDiv.textContent = m.reply ? "↩️ " + m.reply : "";
    }
  });
}

async function reply(id){
  const text = document.getElementById("r"+id).value;
  if(!text.trim()) return;

  await fetch("/reply",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id, reply: text })
  });

  // update DOM ทันที
  document.getElementById("reply"+id).textContent = "↩️ " + text;
  document.getElementById("r"+id).value = "";
  isTyping = false;
}

// โหลดครั้งแรก
load();

// auto refresh ทุก 3 วิ แต่ไม่ล้าง DOM ถ้ากำลังพิมพ์
setInterval(() => {
  if(!isTyping) load();
}, 3000);

</script>
</body>
</html>
