<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💖 Donate H0LLoWx</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://code.jquery.com/jquery-3.7.1.js"></script>

<style>
body {
  margin: 0;
  font-family: "Prompt", sans-serif;

  /* 🎨 พื้นหลังสวยขึ้น + มีมิติ */
  background: radial-gradient(circle at top, #1b2a5a 0%, #0b1020 40%, #05060f 100%);
  color: #fff;

  /* ✨ จัดกลาง */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  min-height: 100vh;
  padding: 24px;
  box-sizing: border-box;

  /* ✨ เอฟเฟกต์เบา ๆ ให้ดูแพง */
  overflow-x: hidden;
}

/* ✨ เพิ่มแสง background เบา ๆ */
body::before {
  content: "";
  position: fixed;
  top: -200px;
  left: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(105,234,255,0.25), transparent 60%);
  filter: blur(80px);
  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  bottom: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(71,179,255,0.18), transparent 60%);
  filter: blur(90px);
  z-index: -1;
} 

/* CARD */
.card {
  width: 100%;
  max-width: 440px;

  /* 🎨 glass premium */
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  padding: 28px;
  border-radius: 24px;

  /* ✨ border glow */
  border: 1px solid rgba(105, 234, 255, 0.15);

  /* 🔥 shadow ลึก + neon */
  box-shadow:
    0 0 25px rgba(0, 180, 255, 0.08),
    0 0 60px rgba(0, 120, 255, 0.12),
    inset 0 0 20px rgba(255, 255, 255, 0.03);

  /* ✨ animation */
  animation: pop 0.45s ease;

  /* layout */
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  box-sizing: border-box;

  /* ✨ hover ลอย */
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 0 35px rgba(0, 200, 255, 0.18),
    0 0 80px rgba(0, 120, 255, 0.25);
}

@keyframes pop {
  from { transform: scale(0.96); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

h2 {
  margin: 0 0 10px;
  font-size: 22px;
  letter-spacing: 0.5px;
}

/* LABEL STYLE */
label {
  font-size: 12px;
  opacity: 0.7;
  margin: 6px 0 4px;
  align-self: flex-start; /* ให้ label ชิดซ้าย */
}


/* INPUT */
/* ✨ INPUT / TEXTAREA (PRO UPGRADE) */
input, textarea {
  width: 100%;
  box-sizing: border-box;

  margin: 8px 0 14px;
  padding: 14px 14px;

  border-radius: 14px;

  /* 🎨 glass style */
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  color: #fff;
  border: 1px solid rgba(105, 234, 255, 0.12);

  outline: none;

  font-size: 14px;
  transition: all 0.25s ease;

  /* ❌ ไม่บังคับกลางแล้ว (ดูแพงขึ้น) */
  text-align: left;

  box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
}

/* ✨ hover */
input:hover, textarea:hover {
  border-color: rgba(105, 234, 255, 0.35);
}

/* ✨ focus (สำคัญสุด) */
input:focus, textarea:focus {
  border-color: #69eaff;

  box-shadow:
    0 0 0 3px rgba(105, 234, 255, 0.12),
    0 0 20px rgba(105, 234, 255, 0.25);

  transform: translateY(-1px);
}

/* ✨ placeholder */
input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.35);
}
textarea#comment {
  width: 100%;
  box-sizing: border-box;

  margin: 6px 0 12px;
  padding: 12px;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(30, 37, 74, 0.7);
  color: #fff;

  font-size: 14px;
  line-height: 1.4;

  text-align: left;

  resize: none;

  min-height: 80px;
  max-height: 180px;

  overflow-y: auto;

  white-space: pre-wrap;   /* 🔥 สำคัญมาก */
  word-break: break-word;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;

  border-radius: 14px;
  border: none;

  /* 🎨 gradient หรูขึ้น */
  background: linear-gradient(135deg, #3aa8ff, #69eaff, #4fd1ff);

  color: #0b1020;
  font-weight: 700;
  font-size: 14px;

  cursor: pointer;
  position: relative;
  overflow: hidden;

  transition: all 0.25s ease;

  margin-top: 8px;

  /* ✨ glow เบา */
  box-shadow: 0 0 18px rgba(105,234,255,0.25);
}

/* ✨ hover */
button:hover {
  transform: translateY(-2px) scale(1.03);

  box-shadow:
    0 0 25px rgba(105,234,255,0.35),
    0 0 60px rgba(71,179,255,0.2);
}

/* ✨ active (กดปุ่ม) */
button:active {
  transform: scale(0.98);
}

/* ✨ shine effect วิ่งผ่านปุ่ม */
button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform: skewX(-20deg);
}

button:hover::before {
  animation: shine 0.7s ease;
}

@keyframes shine {
  0% { left: -120%; }
  100% { left: 120%; }
}


/* QR */
#qr-box {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

#qr-box img {
  width: 230px;
  border-radius: 16px;
  border: 2px solid rgba(105,234,255,0.6);
  margin-top: 10px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* STATUS */
#status {
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.9;
  text-align: center;
}

/* LOADING */
#loader {
  display: none;
  margin-top: 10px;
  opacity: 0.8;
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);

  /* 🎨 glass premium */
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  padding: 18px 26px;
  border-radius: 18px;

  border: 1px solid rgba(105,234,255,0.25);

  /* ✨ glow หลายชั้น */
  box-shadow:
    0 0 20px rgba(105,234,255,0.25),
    0 0 60px rgba(0,150,255,0.15);

  color: #fff;
  text-align: center;

  z-index: 9999;

  display: none;

  /* ✨ animation นุ่มขึ้น */
  opacity: 0;
  transition: all 0.25s ease;
}

/* ✨ ตอนโชว์ */
.popup.show {
  display: block;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ✨ glow pulse เบา ๆ */
@keyframes popupGlow {
  0% {
    box-shadow:
      0 0 15px rgba(105,234,255,0.2),
      0 0 40px rgba(0,150,255,0.1);
  }
  50% {
    box-shadow:
      0 0 25px rgba(105,234,255,0.35),
      0 0 70px rgba(0,150,255,0.2);
  }
  100% {
    box-shadow:
      0 0 15px rgba(105,234,255,0.2),
      0 0 40px rgba(0,150,255,0.1);
  }
}

.popup.show {
  animation: popupGlow 1.5s infinite ease-in-out;
}

/* TIMER */
#timer {
  color: #69eaff;
  font-weight: bold;
}

/* MOBILE */
@media (max-width: 500px) {
  .card {
    padding: 18px;
  }
}

/* ✨ LIVE BOX (PRO STREAM FEED) */
.live-box {
  width: 100%;
  margin: 12px 0;
  padding: 12px 12px;

  /* 🎨 glass look */
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border-radius: 16px;
  border: 1px solid rgba(105, 234, 255, 0.12);

  font-size: 13px;
  text-align: left;

  max-height: 110px;
  overflow-y: auto;

  /* ✨ glow เบา */
  box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
}

/* scrollbar สวยขึ้น */
.live-box::-webkit-scrollbar {
  width: 4px;
}

.live-box::-webkit-scrollbar-thumb {
  background: rgba(105,234,255,0.4);
  border-radius: 10px;
}

/* ✨ item */
.live-item {
  padding: 6px 8px;
  margin-bottom: 6px;

  border-radius: 10px;

  background: rgba(0,0,0,0.15);

  opacity: 0.95;

  transition: 0.2s;

  animation: fadeInUp 0.35s ease;
}

/* hover highlight */
.live-item:hover {
  background: rgba(105,234,255,0.08);
  transform: translateX(3px);
}

/* ✨ animation เข้า */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.navbar-pro {
  display: flex;
  gap: 8px;
  padding: 10px 14px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 0 25px rgba(0,150,255,0.15);

  margin-bottom: 18px;
  flex-wrap: wrap;
  justify-content: center;
}

.nav-item {
  padding: 8px 14px;
  border-radius: 999px;

  font-size: 13px;
  color: #cfe8ff;
  text-decoration: none;

  transition: 0.25s;
}

.nav-item:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-1px);
}

.nav-item.active {
  background: rgba(105,234,255,0.15);
  box-shadow: 0 0 12px rgba(105,234,255,0.4);
}
/* TRUST BADGE */
.trust-bar {
  display: flex;
  gap: 8px;
  margin: 10px 0 14px;
}

.badge {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: #a9d7ff;
}

</style>
</head>

<body>

<div class="navbar-pro">
  <div class="nav-item active">🏠 หน้าแรก</div>
  <div class="nav-item">📖 วิธีใช้งาน</div>
 <a href="contact.html" class="nav-item">📞 ติดต่อ</a>
</div>

<div class="card">
  <h2>สนับสนุน AMR29💖</h2>

<div class="trust-bar">
  <div class="badge">🔒 SSL Secured</div>
  <div class="badge">⚡ Real-time</div>
  <div class="badge">💳 PromptPay</div>
</div>

  <div class="live-box" id="liveBox">
  <div class="live-item">💬 พร้อมรับโดเนทแบบเรียลไทม์</div>
</div>

<div style="margin-top:8px; font-size:11px; opacity:0.7;">
🟢 ระบบเชื่อมต่อเซิร์ฟเวอร์แบบเรียลไทม์
</div>



  <label>ชื่อบนจอ</label>
  <textarea id="msg" placeholder="Anonymous"></textarea>

  <label>จำนวนเงิน</label>
  <input id="amount" type="number" placeholder="0.00" />

<div style="margin-top:6px; font-size:12px; opacity:0.75; color:#69eaff;">
⚠️ ระบบรับโดเนทขั้นต่ำ 10 บาท
</div>

<label style="font-size:15px; font-weight:700; color:#69eaff; letter-spacing:0.3px;">
💬 ข้อความ <span style="font-size:12px; opacity:0.7;">(พิมพ์ยาวได้ / ขึ้นบรรทัดใหม่)</span>
</label>
  <textarea id="comment" placeholder="ขอบคุณสำหรับโดเนท 💖"></textarea>

  <button onclick="generateQR()">สร้าง QR พร้อมโดเนท</button>
  <div style="margin-top:10px; font-size:12px; opacity:0.85;">
  💰 ยอดโดเนทรวมวันนี้: <span id="totalDonate">0</span> บาท
</div>

  <div id="loader">🕓 กำลังสร้าง QR...</div>
  <div id="qr-box"></div>
  <div id="status"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  💖 ขอบคุณสำหรับการสนับสนุน!
  
</div>

<script>
let ws;
let countdown;

function connectWS() {
  ws = new WebSocket(
    (location.protocol === "https:" ? "wss://" : "ws://") +
    location.host +
    "/ws"
  );

  ws.onopen = () => console.log("WS connected");
  ws.onclose = () => setTimeout(connectWS, 2000);

ws.onmessage = (e) => {
  let data;
  try {
    data = JSON.parse(e.data);
  } catch {
    return;
  }

  // ❌ ไม่เอา test / replay
  if (data.type === "test_alert") return;
  if (data.type === "replay_alert") return;

  // ✅ เฉพาะเงินเข้า
  if (data.type === "donate") {
    addLive(data.name || "Anonymous", data.amount || 0);
loadTotal(); // 🔥 อัปเดตยอดทันที
    showPopup();
    $("#status").html("✅ โดเนทสำเร็จ");
    $("#qr-box").empty();
    $("#loader").hide();
    $("#amount,#msg,#comment").val("");
    clearInterval(countdown);
  }
};
}

connectWS();
loadTotal();

async function generateQR() {
  const amount = parseFloat($("#amount").val());
  const nameRaw = $("#msg").val().trim();
  const name = nameRaw === "" ? "Anonymous" : nameRaw;
  const comment = $("#comment").val() || "";

  // ❌ เช็คขั้นต่ำ 10 บาท
if (!amount || amount < 10) {
  const p = document.getElementById("popup");
  p.innerHTML = "⚠️ ขั้นต่ำโดเนท 10 บาท 💖";
  p.classList.add("show");

  setTimeout(() => {
    p.classList.remove("show");
    p.innerHTML = "💖 ขอบคุณสำหรับการสนับสนุน!";
  }, 2500);

  return;
}

  $("#loader").show();
  $("#status").html("🕓 กำลังสร้าง...");
  $("#qr-box").empty();

  try {
    const res = await fetch("/generateQR", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount, name, comment })
    });

    const data = await res.json();

    $("#loader").hide();
    $("#qr-box").html(`<img src="${data.result}">`);

    $("#status").html(`⏳ หมดเวลา <b id="timer">05:00</b>`);
    startTimer(300);

  } catch (err) {
    $("#status").html("❌ error");
    $("#loader").hide();
  }
}

function startTimer(sec) {
  let time = sec;
  clearInterval(countdown);

  countdown = setInterval(() => {
    time--;

    const m = String(Math.floor(time / 60)).padStart(2,"0");
    const s = String(time % 60).padStart(2,"0");

    const el = document.getElementById("timer");
    if (el) el.innerText = `${m}:${s}`;

    if (time <= 0) {
      clearInterval(countdown);
      $("#status").html("⏰ หมดเวลา");
      $("#qr-box").empty();
    }
  }, 1000);
}

function showPopup() {
  const p = document.getElementById("popup");
  p.classList.add("show");

  setTimeout(() => {
    p.classList.remove("show");
  }, 3000);
}

const msgInput = document.getElementById("msg");

// default value
msgInput.value = "Anonymous";

// จำกัดภาษาอังกฤษ + 9 ตัวอักษร
msgInput.addEventListener("input", function () {
  let value = msgInput.value;

  // 🔥 เอาเฉพาะ A-Z a-z
  value = value.replace(/[^a-zA-Z]/g, "");

  // 🔥 จำกัด 9 ตัว
  if (value.length > 9) {
    value = value.slice(0, 9);
  }

  msgInput.value = value;
});

async function loadTotal() {
  try {
    const res = await fetch("/donates.json");
    const data = await res.json();

    // เอาเฉพาะ “วันนี้”
    const today = new Date().toDateString();

    const total = data
      .filter(d => new Date(d.time).toDateString() === today)
      .reduce((sum, d) => sum + Number(d.amount || 0), 0);

    document.getElementById("totalDonate").innerText = total;
  } catch (err) {
    console.log("❌ load total error", err);
  }
}
function addLive(name, amount){
  const box = document.getElementById("liveBox");
  const item = document.createElement("div");
  item.className = "live-item";
  item.innerHTML = `💖 ${name} โดเนท ${amount} บาท`;

  box.prepend(item);

  if(box.children.length > 5){
    box.removeChild(box.lastChild);
  }
} 

function openContact(){
  const p = document.getElementById("contactPopup");
  p.style.display = "block";
  setTimeout(() => p.style.display = "none", 4000);
}
</script>

<script>
// ❌ ปิดคลิกขวา
document.addEventListener("contextmenu", function (e) {
  e.preventDefault();
});

// ❌ ปิดปุ่ม inspect / devtools shortcut
document.addEventListener("keydown", function (e) {
  // F12
  if (e.key === "F12") {
    e.preventDefault();
  }

  // Ctrl + Shift + I / J / C
  if (e.ctrlKey && e.shiftKey) {
    if (
      e.key.toLowerCase() === "i" ||
      e.key.toLowerCase() === "j" ||
      e.key.toLowerCase() === "c"
    ) {
      e.preventDefault();
    }
  }

  // Ctrl + U (view source)
  if (e.ctrlKey && e.key.toLowerCase() === "u") {
    e.preventDefault();
  }
});
</script>

</body>
</html>
